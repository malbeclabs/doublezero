name: Reusable - Push Component Tag

on:
  workflow_call:
    inputs:
      version:
        description: 'The semantic version tag to create (format: vX.X.X)'
        required: true
        type: string
      component:
        description: 'The component to tag'
        required: true
        type: string
      ref:
        description: 'Commit to tag. Empty tags the sha the run is pinned to (the manual dispatcher path: main at dispatch).'
        required: false
        type: string
        default: ''
      skip_existing:
        description: 'Succeed without re-tagging if the tag already exists (for orchestrator re-runs)'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Validate inputs and succeed without pushing anything (for orchestrator dry runs)'
        required: false
        type: boolean
        default: false
    secrets:
      DOUBLEZERO_PAT:
        description: 'PAT to push tags to the repository'
        required: true

# This workflow is pure mechanism and carries no environment; the approval
# prompt belongs to the callers: the release orchestrator's gate 1 (verified
# against the merged version PRs) and the manual dispatcher's approve job.
# The caller allowlist below makes that binding: any new caller fails closed
# until it is added here — with its own approval story — in a reviewed change.
jobs:
  create-and-push-tag:
    name: Push ${{ inputs.version }} tag for ${{ inputs.component }}
    runs-on: ubuntu-latest
    steps:
      - name: Require an approval-carrying caller
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          case "$WORKFLOW_REF" in
            malbeclabs/doublezero/.github/workflows/release.testnet.yml@*)
              echo "caller ok (orchestrator, approval at gate 1): $WORKFLOW_REF" ;;
            malbeclabs/doublezero/.github/workflows/release.testnet.push.tags.components.yml@*)
              echo "caller ok (manual dispatcher, approval at its approve job): $WORKFLOW_REF" ;;
            *)
              echo "::error::release.testnet.push.tags.yml must be called via the release orchestrator or the components dispatcher, which carry the approval prompt (got: $WORKFLOW_REF). Add new callers to the allowlist here together with their approval mechanism."
              exit 1 ;;
          esac

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: malbeclabs/doublezero
          token: ${{ secrets.DOUBLEZERO_PAT }}
          # empty ref = the sha this run is pinned to (actions/checkout default)
          ref: ${{ inputs.ref }}
          fetch-tags: true

      - name: Validate format and push tag
        run: |
          VERSION="${{ inputs.version }}"
          COMPONENT="${{ inputs.component }}"
          TAG_NAME="$COMPONENT/$VERSION"

          VERSION_REGEX="^v[0-9]+\.[0-9]+\.[0-9]+$"

          if ! [[ "$VERSION" =~ $VERSION_REGEX ]]; then
            echo "Error: Version format '$VERSION' is invalid. It must be in the format 'vX.X.X'."
            exit 1
          fi
          echo "Version format is valid."

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "Dry run — not pushing tag '$TAG_NAME'."
            exit 0
          fi

          if EXISTING=$(git rev-parse -q --verify "refs/tags/$TAG_NAME^{commit}"); then
            if [ "${{ inputs.skip_existing }}" = "true" ]; then
              HEAD_SHA=$(git rev-parse HEAD)
              echo "Tag '$TAG_NAME' already exists at $EXISTING; skipping (skip_existing=true)."
              if [ "$EXISTING" != "$HEAD_SHA" ]; then
                echo "::warning::existing tag '$TAG_NAME' points at $EXISTING, but this run would have tagged $HEAD_SHA"
              fi
              exit 0
            fi
            echo "Error: Tag '$TAG_NAME' already exists in the repository."
            exit 1
          fi
          echo "Tag '$TAG_NAME' will be created."

          git tag "$TAG_NAME"
          echo "Successfully created tag '$TAG_NAME' locally."

          git push origin tag "$TAG_NAME"
          echo "Successfully pushed tag '$TAG_NAME'."
