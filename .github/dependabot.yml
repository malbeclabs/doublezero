# yaml-language-server: $schema=https://json.schemastore.org/dependabot-2.0.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "gomod"
    directories:
      - "**/*"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 10
    labels:
      - "skip-changelog"
      - "dependencies"
      - "go"
    ignore:
      # testcontainers >=0.41 switched docker/docker types to moby/moby, which
      # breaks e2e/internal/devnet. Remove after migrating the e2e harness.
      - dependency-name: "github.com/testcontainers/testcontainers-go*"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"
    groups:
      go-minor-patch:
        update-types:
          - "minor"
          - "patch"
      go-testing:
        patterns:
          - "github.com/stretchr/testify"
          - "github.com/golang/mock"
          - "go.uber.org/mock"

  - package-ecosystem: "cargo"
    directories:
      - "**/*"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 10
    labels:
      - "skip-changelog"
      - "dependencies"
      - "rust"
    ignore:
      # Solana major bumps are deliberate migrations (e.g. #3830), not
      # dependabot fodder.
      - dependency-name: "solana-*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "spl-*"
        update-types:
          - "version-update:semver-major"
    groups:
      rust-minor-patch:
        update-types:
          - "minor"
          - "patch"
      solana:
        patterns:
          - "solana-*"
          - "spl-*"
      anchor:
        patterns:
          - "anchor-*"
      tokio:
        patterns:
          - "tokio*"
      serde:
        patterns:
          - "serde*"
