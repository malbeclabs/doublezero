name: dispatch-and-wait
description: Dispatch a workflow_dispatch workflow in another repo and wait for it to complete.
inputs:
  repo:
    description: 'owner/repo to dispatch in'
    required: true
  workflow:
    description: 'Workflow file name (e.g. deploy-core.testnet.yml). Must accept a correlation_id input surfaced in its run-name.'
    required: true
  ref:
    description: 'Git ref to run the workflow from'
    required: false
    default: 'main'
  fields:
    description: 'Extra inputs, one key=value per line'
    required: false
    default: ''
  token:
    description: 'Token with actions:write on the target repo'
    required: true
  slack-bot-token:
    description: >-
      Optional Slack bot token. When set together with slack-channel, posts a
      link to the dispatched run before watching it, so a run gated on a
      required-reviewer environment in the target repo gets approved instead of
      stalling unnoticed.
    required: false
    default: ''
  slack-channel:
    description: 'Slack channel ID to post the approval ping to'
    required: false
    default: ''
  slack-thread-ts:
    description: >-
      ts of a parent Slack message. When set, the approval ping is posted as a
      reply in that thread; when empty, it is posted as a top-level message.
    required: false
    default: ''
runs:
  using: composite
  steps:
    - shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        REPO: ${{ inputs.repo }}
        WORKFLOW: ${{ inputs.workflow }}
        REF: ${{ inputs.ref }}
        FIELDS: ${{ inputs.fields }}
        SLACK_BOT_TOKEN: ${{ inputs.slack-bot-token }}
        SLACK_CHANNEL: ${{ inputs.slack-channel }}
        SLACK_THREAD_TS: ${{ inputs.slack-thread-ts }}
      run: |
        set -euo pipefail
        CID="cid-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${RANDOM}"
        ARGS=(-f "correlation_id=$CID")
        while IFS= read -r kv; do
          [ -n "$kv" ] && ARGS+=(-f "$kv")
        done <<< "$FIELDS"
        echo "Dispatching $WORKFLOW in $REPO with correlation id $CID"
        gh workflow run "$WORKFLOW" -R "$REPO" --ref "$REF" "${ARGS[@]}"
        RUN_ID=""
        for _ in $(seq 1 30); do
          sleep 10
          RUN_ID=$(gh run list -R "$REPO" --workflow "$WORKFLOW" --limit 20 \
            --json databaseId,displayTitle \
            --jq "[.[] | select(.displayTitle | contains(\"$CID\"))][0].databaseId // empty")
          [ -n "$RUN_ID" ] && break
        done
        if [ -z "$RUN_ID" ]; then
          echo "::error::could not find dispatched run for correlation id $CID in $REPO/$WORKFLOW"
          exit 1
        fi
        RUN_URL="https://github.com/$REPO/actions/runs/$RUN_ID"
        if [ -n "$SLACK_BOT_TOKEN" ] && [ -n "$SLACK_CHANNEL" ]; then
          PAYLOAD=$(jq -n --arg ch "$SLACK_CHANNEL" \
            --arg text "$WORKFLOW run in $REPO may need environment approval: $RUN_URL" \
            --arg ts "$SLACK_THREAD_TS" \
            '{channel: $ch, text: $text} + (if $ts != "" then {thread_ts: $ts} else {} end)')
          RESP=$(curl -sf https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H 'Content-type: application/json; charset=utf-8' \
            --data "$PAYLOAD") || RESP='{"ok":false,"error":"curl error"}'
          # chat.postMessage returns HTTP 200 with ok=false on errors; check .ok.
          echo "$RESP" | jq -e '.ok' >/dev/null \
            || echo "::warning::failed to post Slack approval ping for $RUN_URL: $(echo "$RESP" | jq -r '.error')"
        fi
        echo "Watching $RUN_URL"
        gh run watch "$RUN_ID" -R "$REPO" --exit-status --interval 30
