# yaml-language-server: $schema=https://goreleaser.com/static/schema-pro.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

project_name: doublezero

monorepo:
  tag_prefix: client/

# Generate shell-completion scripts once, natively, before the cross-compiled
# release builds run. The output of `doublezero completion <shell>` depends only
# on the clap Command tree, not the target arch, so a native build is sufficient
# and the same files are bundled into every nfpm artifact.
before:
  hooks:
    - sh -c 'mkdir -p build/completions'
    - cargo build --release --package=doublezero --bin=doublezero
    - sh -c 'target/release/doublezero completion bash > build/completions/doublezero.bash'
    - sh -c 'target/release/doublezero completion zsh  > build/completions/_doublezero'
    - sh -c 'target/release/doublezero completion fish > build/completions/doublezero.fish'

builds:
  - id: doublezerod
    main: client/doublezerod/cmd/doublezerod/main.go
    binary: doublezerod
    env:
      - CGO_ENABLED=0
    ldflags:
      -X main.version={{.Version}} -X main.commit={{.ShortCommit}} -X main.date={{.Date}}
    goos:
      - linux
    goarch:
      - amd64
  - id: doublezero-cli                  # default env = testnet
    builder: rust
    tool: cargo
    binary: doublezero
    targets:
      - x86_64-unknown-linux-musl
    command: build
    flags:
      - --package=doublezero
      - --release
    env:
      - CC_x86_64_unknown_linux_musl=musl-gcc
      - CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc
      - BUILD_VERSION={{.Version}}
  - id: doublezero-cli-mainnet-beta       # default env = mainnet-beta
    builder: rust
    tool: cargo
    binary: doublezero
    targets:
      - x86_64-unknown-linux-musl
    command: build
    flags:
      - --package=doublezero
      - --release
      - --features=default-mainnet-beta
    env:
      - CC_x86_64_unknown_linux_musl=musl-gcc
      - CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc
      - BUILD_VERSION={{.Version}}

archives:
  - id: doublezero_archive
    formats: ['tar.gz']
    ids: [doublezero-cli, doublezerod]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

nfpms:
  - id: doublezero
    package_name: doublezero
    ids: [doublezerod, doublezero-cli]
    vendor: doublezero
    homepage: doublezero.xyz
    maintainer: steve <steve@malbeclabs.com>
    description: |-
      DoubleZero client and cli
    license: Apache 2.0
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    release: 1
    section: default
    dependencies:
      - doublezero-solana
    contents:
      - src: client/doublezerod/cmd/doublezerod/doublezerod.service
        dst: /usr/lib/systemd/system/doublezerod.service
      - src: build/completions/doublezero.bash
        dst: /usr/share/bash-completion/completions/doublezero
      - src: build/completions/_doublezero
        dst: /usr/share/zsh/site-functions/_doublezero
      - src: build/completions/doublezero.fish
        dst: /usr/share/fish/vendor_completions.d/doublezero.fish
    recommends:
      - bash-completion
    deb:
      predepends:
        - adduser
    overrides:
      deb:
          scripts:
            postinstall: client/packaging/scripts/doublezerod/deb/postinstall.sh
            preremove: client/packaging/scripts/doublezerod/deb/preremove.sh
            postremove: client/packaging/scripts/doublezerod/deb/postremove.sh
      rpm:
          scripts:
            postinstall: client/packaging/scripts/doublezerod/rpm/postinstall.sh
            preremove: client/packaging/scripts/doublezerod/rpm/preremove.sh
            postremove: client/packaging/scripts/doublezerod/rpm/postremove.sh
  - id: doublezero-mainnet-beta
    package_name: doublezero
    file_name_template: "{{ .PackageName }}-mainnet-beta_{{ .Version }}_{{ .Arch }}"
    ids: [doublezerod, doublezero-cli-mainnet-beta]
    vendor: doublezero
    homepage: doublezero.xyz
    maintainer: steve <steve@malbeclabs.com>
    description: |-
      DoubleZero client and cli
    license: Apache 2.0
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    release: 1
    section: default
    dependencies:
      - doublezero-solana
    contents:
      - src: client/doublezerod/cmd/doublezerod/doublezerod.mainnet-beta.service
        dst: /usr/lib/systemd/system/doublezerod.service
      - src: build/completions/doublezero.bash
        dst: /usr/share/bash-completion/completions/doublezero
      - src: build/completions/_doublezero
        dst: /usr/share/zsh/site-functions/_doublezero
      - src: build/completions/doublezero.fish
        dst: /usr/share/fish/vendor_completions.d/doublezero.fish
    recommends:
      - bash-completion
    deb:
      predepends:
        - adduser
    overrides:
      deb:
          scripts:
            postinstall: client/packaging/scripts/doublezerod/deb/postinstall.sh
            preremove: client/packaging/scripts/doublezerod/deb/preremove.sh
            postremove: client/packaging/scripts/doublezerod/deb/postremove.sh
      rpm:
          scripts:
            postinstall: client/packaging/scripts/doublezerod/rpm/postinstall.sh
            preremove: client/packaging/scripts/doublezerod/rpm/preremove.sh
            postremove: client/packaging/scripts/doublezerod/rpm/postremove.sh

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: malbeclabs
    name: doublezero
  draft: false
  replace_existing_artifacts: true

announce:
  slack:
    enabled: true
    message_template: "DoubleZero {{.Tag}} has been released! Check it out at {{ .ReleaseURL }}"
    channel: "#bots"

git:
  ignore_tags:
    - client/daily

nightly:
  publish_release: true
  keep_single_release: true
  version_template: '{{ incpatch .Version }}~git{{ .Env.BUILD_DATE }}.{{ .ShortCommit }}'
  tag_name: 'client/daily'
